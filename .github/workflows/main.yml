name: Daily Stock Report

on:
  schedule:
    - cron: '0 21 * * *'  # 04:00 น. ไทย
    - cron: '0 13 * * *'  # 20:00 น. ไทย
  workflow_dispatch:      # ช่วยให้เรากดรันเองได้

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests pandas

      - name: Run bot script
        run: python bot.py
